<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Calculadora Sueldo Neto Autónomo 2026 | Descubre tu beneficio real</title>
    <meta name="description" content="Calculadora gratuita para autónomos en España. Descubre cuánto dinero limpio te queda a fin de mes tras pagar tu cuota de la Seguridad Social y el IRPF.">
    <meta name="keywords" content="calculadora autonomos, sueldo neto autonomo, cuota autonomos 2026, irpf autonomos, tarifa plana, calculadora freelance">
    <meta name="author" content="Tu Nombre">

    <meta property="og:title" content="Calculadora Sueldo Neto Autónomo Pro">
    <meta property="og:description" content="Descubre tu sueldo real como autónomo en España en un solo clic.">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta Dark Mode */
            --primary: #6366f1; /* Índigo más brillante para fondo oscuro */
            --primary-hover: #4f46e5;
            --bg-start: #0f172a; /* Slate 900 - Azul muy oscuro */
            --bg-end: #1e1b4b; /* Indigo muy oscuro */
            --card-bg: rgba(30, 41, 59, 0.7); /* Cristal oscuro transparente */
            --text-main: #f8fafc; /* Blanco roto */
            --text-muted: #94a3b8; /* Gris azulado */
            --success: #34d399; /* Verde esmeralda brillante */
            --danger: #f87171; /* Rojo suave brillante */
            --border: rgba(255, 255, 255, 0.1);
            --font-titles: 'Montserrat', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; 
            position: relative;
            color: var(--text-main);
        }

        /* --- Estilos del Fondo Dinámico Oscuro --- */
        .background-tags {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1; 
        }

        .floating-tag {
            position: absolute;
            font-family: var(--font-titles);
            font-weight: 700;
            font-size: 14px;
            color: #818cf8; /* Texto índigo brillante */
            background-color: rgba(99, 102, 241, 0.1); /* Fondo translúcido */
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.1); /* Resplandor sutil */
            white-space: nowrap;
            user-select: none;
            opacity: 0.7; /* Más visibles en modo oscuro */
            animation: floatAnimation 6s ease-in-out infinite;
        }

        @keyframes floatAnimation {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .tag-1 { top: 12%; left: 12%; animation-delay: 0s; }
        .tag-2 { top: 15%; right: 15%; animation-delay: 1s; font-size: 18px; opacity: 0.5; }
        .tag-3 { bottom: 20%; left: 15%; animation-delay: 2s; }
        .tag-4 { bottom: 12%; right: 12%; animation-delay: 3s; }
        .tag-5 { top: 45%; left: 5%; animation-delay: 1.5s; font-size: 12px; }
        .tag-6 { top: 65%; right: 5%; animation-delay: 2.5s; }

        @media (max-width: 600px) {
            .floating-tag { font-size: 12px; }
            .tag-5, .tag-6 { display: none; }
        }

        /* --- Estilos de la Calculadora Dark --- */
        .calculadora {
            background-color: var(--card-bg);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); /* Sombra más dura */
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255, 255, 255, 0.08); /* Borde de cristal */
            backdrop-filter: blur(16px); /* Desfoque alto para efecto cristal */
            -webkit-backdrop-filter: blur(16px);
            box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 35px; }
        .header h2 { 
            font-family: var(--font-titles);
            font-weight: 900; 
            color: var(--text-main); 
            margin: 0 0 10px 0; 
            font-size: 28px; 
            letter-spacing: -1px; 
        }
        .header p { color: var(--text-muted); margin: 0; font-size: 16px; font-weight: 400; }

        .campo { margin-bottom: 25px; }
        .campo label { 
            display: block; font-weight: 600; font-size: 14px; 
            color: var(--text-muted); margin-bottom: 10px; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        
        input[type="number"] {
            font-family: var(--font-body);
            font-weight: 600; width: 100%; padding: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px; font-size: 18px; 
            color: var(--text-main); box-sizing: border-box;
            transition: all 0.3s ease;
            background-color: rgba(15, 23, 42, 0.6); /* Fondo input oscuro */
        }
        input[type="number"]::placeholder { color: #475569; }
        input[type="number"]:focus {
            outline: none; border-color: var(--primary);
            background-color: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .toggle-container {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px; background-color: rgba(15, 23, 42, 0.4);
            border-radius: 14px; border: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .toggle-text { font-family: var(--font-titles); font-size: 15px; font-weight: 700; color: var(--text-main); }
        .toggle-subtext { font-family: var(--font-body); font-size: 12px; color: var(--text-muted); display: block; margin-top: 3px; }
        
        .switch { position: relative; display: inline-block; width: 54px; height: 30px; flex-shrink: 0;}
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: #94a3b8; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); background-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        button {
            font-family: var(--font-titles); font-weight: 800; letter-spacing: 0.5px;
            background-color: var(--primary); color: white; border: none;
            padding: 18px; border-radius: 14px; cursor: pointer;
            font-size: 17px; width: 100%; transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }
        button:hover { 
            background-color: var(--primary-hover); transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6);
        }

        .resultado {
            margin-top: 30px; padding: 25px; border-radius: 18px;
            background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            display: none; animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .resultado-neto { 
            font-family: var(--font-body); font-size: 36px; font-weight: 800; 
            text-align: center; margin-bottom: 15px; letter-spacing: -1.5px;
        }
        .desglose-item { 
            display: flex; justify-content: space-between; font-size: 15px; 
            margin-bottom: 10px; padding-bottom: 10px; 
            border-bottom: 1px dashed rgba(255,255,255,0.1); 
        }
        .desglose-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        .desglose-nombre { font-family: var(--font-titles); font-weight: 600; font-size: 13px; color: var(--text-muted); }
        .desglose-valor { font-family: var(--font-body); font-weight: 600; color: var(--text-main); font-size: 15px; }
    </style>
</head>
<body>

    <div class="background-tags">
        <div class="floating-tag tag-1">IRPF 15%</div>
        <div class="floating-tag tag-2">Calcula tus Ganancias</div>
        <div class="floating-tag tag-3">Cuota Autónomos</div>
        <div class="floating-tag tag-4">Neto Real €</div>
        <div class="floating-tag tag-5">Ahorro Fiscal</div>
        <div class="floating-tag tag-6">Modelo 130</div>
    </div>

    <div class="calculadora">
        <div class="header">
            <h2>Calcula tu Neto</h2>
            <p>Descubre tu sueldo real como autónomo</p>
        </div>
        
        <div class="campo">
            <label>Tus Ingresos (Mensuales, sin IVA)</label>
            <input type="number" id="ingresos" placeholder="Ej: 3000 €">
        </div>

        <div class="campo">
            <label>Tus Gastos (Mensuales, sin IVA)</label>
            <input type="number" id="gastos" placeholder="Ej: 400 €">
        </div>

        <div class="toggle-container">
            <div>
                <span class="toggle-text">Tarifa Plana</span>
                <span class="toggle-subtext">Nuevos autónomos (80€ cuota, IRPF 7%)</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="nuevo-autonomo">
                <span class="slider"></span>
            </label>
        </div>
        
        <button onclick="calcularNeto()">Analizar mis Beneficios</button>

        <div class="resultado" id="caja-resultado">
            <div class="resultado-neto" id="texto-neto"></div>
            <div id="caja-desglose"></div>
        </div>
    </div>

    <script>
        function calcularNeto() {
            let ingresos = parseFloat(document.getElementById('ingresos').value);
            let gastos = parseFloat(document.getElementById('gastos').value) || 0;
            let esNuevoAutonomo = document.getElementById('nuevo-autonomo').checked;
            
            if (isNaN(ingresos) || ingresos <= 0) {
                alert("Por favor, introduce unos ingresos válidos para el análisis.");
                return;
            }

            let beneficio = ingresos - gastos;
            let porcentajeIrpf = esNuevoAutonomo ? 0.07 : 0.15;
            let irpf = ingresos * porcentajeIrpf; 
            
            let cuotaAutonomo = 300; 
            if (esNuevoAutonomo) {
                cuotaAutonomo = 80; 
            } else {
                if (beneficio < 1125) cuotaAutonomo = 230;
                else if (beneficio < 1700) cuotaAutonomo = 294;
                else if (beneficio < 2330) cuotaAutonomo = 323;
                else if (beneficio < 3190) cuotaAutonomo = 380;
                else cuotaAutonomo = 420; 
            }

            let neto = beneficio - irpf - cuotaAutonomo;

            document.getElementById('caja-resultado').style.display = "block";
            
            let textoNeto = document.getElementById('texto-neto');
            if (neto < 0) {
                textoNeto.style.color = "var(--danger)";
                textoNeto.innerText = neto.toFixed(2) + " €";
            } else {
                textoNeto.style.color = "var(--success)";
                textoNeto.innerText = neto.toFixed(2) + " €";
            }

            let desgloseHTML = `
                <div class="desglose-item">
                    <span class="desglose-nombre">Beneficio Bruto</span>
                    <span class="desglose-valor">${beneficio.toFixed(2)} €</span>
                </div>
                <div class="desglose-item">
                    <span class="desglose-nombre">IRPF Retenido (${esNuevoAutonomo ? '7%' : '15%'})</span>
                    <span class="desglose-valor" style="color: var(--danger)">- ${irpf.toFixed(2)} €</span>
                </div>
                <div class="desglose-item">
                    <span class="desglose-nombre">Cuota Seg. Social (Estimada)</span>
                    <span class="desglose-valor" style="color: var(--danger)">- ${cuotaAutonomo.toFixed(2)} €</span>
                </div>
            `;
            
            document.getElementById('caja-desglose').innerHTML = desgloseHTML;
        }
    </script>

</body>
</html>
